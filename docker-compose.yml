services:
  db:
    image: mysql:8.0
    container_name: blog_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - blog_network

  wordpress:
    image: wordpress:latest
    container_name: blog_wp
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DEBUG: "1"
    volumes:
      - wp_data:/var/www/html
      - ./plugins:/var/www/html/wp-content/plugins/stock-analysis
      - ./themes/twentytwentyfour-child:/var/www/html/wp-content/themes/twentytwentyfour-child
    networks:
      - blog_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: blog_pma
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: wordpress
      PMA_PASSWORD: wordpress
    networks:
      - blog_network

volumes:
  db_data:
  wp_data:

networks:
  blog_network:
    driver: bridge
